    --ink:#2A2D34;
    --line:#E7E2D8;
    --shadow-sm:0 2px 8px rgba(15,27,48,0.10);

}

*{

}

body{

#book{

.page{

}

.page img{

.controls{

}

.btn{
    background:rgba(255,255,255,0.96);

    font-weight:600;
    box-shadow:var(--shadow-sm);

}

.btn:hover{

.btn:active{

.icon-btn{

}

.category-btn.active{
    background:var(--gold);

.gallery-grid{

.gallery-item:hover{

.gallery-item img{

#viewer{

let zoomBaseIndex = 0;

let imgScale = 1;
let imgTranslateX = 0;
let imgTranslateY = 0;

let lastTouchDistance = null;
let lastPanX = 0;
let lastPanY = 0;
let lastTapTime = 0;
let zoomTouchEventsReady = false;

function applyImgTransform(){
    const img = document.getElementById("zoomImg");
    img.style.transform =
        `translate(-50%,-50%) translate(${imgTranslateX}px, ${imgTranslateY}px) scale(${imgScale})`;
}

function resetImgTransform(){
    imgScale = 1;
    imgTranslateX = 0;
    imgTranslateY = 0;
    applyImgTransform();
}

function getTouchDistance(touches){
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

function setupZoomImgTouchEvents(){
    if(zoomTouchEventsReady) return;
    zoomTouchEventsReady = true;

    const img = document.getElementById("zoomImg");

    img.addEventListener("touchstart", function(e){
        if(e.touches.length === 2){
            lastTouchDistance = getTouchDistance(e.touches);
        } else if(e.touches.length === 1){
            lastPanX = e.touches[0].clientX;
            lastPanY = e.touches[0].clientY;

            const now = Date.now();
            if(now - lastTapTime < 300){
                if(imgScale > 1){
                    resetImgTransform();
                } else {
                    imgScale = 2;
                    applyImgTransform();
                }
            }
            lastTapTime = now;
        }
    }, { passive:true });

    img.addEventListener("touchmove", function(e){
        if(e.touches.length === 2){
            e.preventDefault();

            const newDistance = getTouchDistance(e.touches);

            if(lastTouchDistance){
                const scaleChange = newDistance / lastTouchDistance;
                imgScale *= scaleChange;
                imgScale = Math.min(Math.max(imgScale, 1), 5);
            }

            lastTouchDistance = newDistance;
            applyImgTransform();

        } else if(e.touches.length === 1 && imgScale > 1){
            e.preventDefault();

            const dx = e.touches[0].clientX - lastPanX;
            const dy = e.touches[0].clientY - lastPanY;

            imgTranslateX += dx;
            imgTranslateY += dy;

            lastPanX = e.touches[0].clientX;
            lastPanY = e.touches[0].clientY;

            applyImgTransform();
        }
    }, { passive:false });

    img.addEventListener("touchend", function(e){
        if(e.touches.length < 2){
            lastTouchDistance = null;
        }
        if(e.touches.length === 0 && imgScale < 1.05){
            resetImgTransform();
        }
    }, { passive:true });
}

    }
    if(e.ctrlKey && (e.key === "-" || e.key === "NumpadSubtract")){

        e.preventDefault();
        if(e.deltaY < 0) bookZoom += 15;

        bookZoom = Math.min(400, Math.max(50, bookZoom));
        applyBookZoom();
    }
}, { passive: false });

function normalizeText(text){
    return String(text || "")
        .toLowerCase()
        .replace(/\s/g,"")
        .replace(/_/g,"")
        .replace(/-/g,"");
}

function highlightKeyword(text, rawKeyword){
    if(!rawKeyword) return text;

    const escaped = rawKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, "gi");

    return text.replace(regex, '<mark class="search-highlight">$1</mark>');
}
    
function highlightKeyword(text, rawKeyword){
    if(!rawKeyword) return text;

    const escaped = rawKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, "gi");

    return text.replace(regex, '<mark class="search-highlight">$1</mark>');
}    
    
function searchPages(){
    const rawKeyword = document.getElementById("searchInput").value;
    const keyword = normalizeText(rawKeyword);

    const resultBox = document.getElementById("searchResult");
    resultBox.innerHTML = "";

    if(keyword === ""){
        return;
    }

    pages.forEach((item,index)=>{
        const fileKey = `${item.folder}/${item.name}`;
        const fileNameText = normalizeText(item.name);
        const ocrText = normalizeText(
           typeof ocrTexts !== "undefined" && ocrTexts[fileKey]
    ? ocrTexts[fileKey]
    : ""
        );

      const manualPages = [];

Object.keys(manualKeywords).forEach(key => {
    if(
        normalizeText(key).includes(keyword) ||
        keyword.includes(normalizeText(key))
    ){
        manualPages.push(...manualKeywords[key]);
    }
});

if(
    fileNameText.includes(keyword) ||
    ocrText.includes(keyword) ||
    manualPages.includes(index + 1)
){
            const div = document.createElement("div");
            div.className = "search-item";

            const displayName = item.name.replace(".JPG", "");
            const highlightedName = highlightKeyword(displayName, rawKeyword);

            div.innerHTML = `${index+1}페이지 - ${highlightedName}`;

            div.onclick = ()=>{
                pageFlip.flip(index);
                closeSearch();
            };

            resultBox.appendChild(div);
        }
    });

    if(resultBox.innerHTML === ""){
        resultBox.innerHTML =
            "<div class='search-item'>검색 결과가 없습니다.</div>";
    }
}
